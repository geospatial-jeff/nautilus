name: CI

on:
  push:
  pull_request:

# The base gates: lint, format, types, the import-linter contracts, and the hermetic unit suite. The
# multi-node integration test (Docker) is a separate workflow (compose.yml); `pytest` here excludes it via
# the `-m 'not docker'` default in pyproject. The benchmark regression gate is also its own workflow
# (bench-check.yml) so its multi-minute sweep does not slow this fast feedback loop.
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.14
      - run: uv pip install -e ".[dev,fast,geo]"   # geo: the Sentinel-2 example + its hermetic tests
      - run: uv run ruff check src tests
      - run: uv run black --check src tests
      - run: uv run mypy
      - run: uv run lint-imports
      - run: uv run pytest -q
