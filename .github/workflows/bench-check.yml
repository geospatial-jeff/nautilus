name: bench-check

# The throughput + output-correctness regression gate for the benchmarks.
#
# Two checks run here, with different reach. The structural-digest check is machine-independent and
# always active: it fails the moment a change alters what a benchmark computes, so it is the real reason
# this gate runs on every code PR. The throughput check is comparable only on identical hardware, and
# GitHub-hosted runners land on a different physical CPU each run (a memory-bound pipeline's throughput
# swings with the CPU), so throughput baselines are kept per CPU model in benchmarks/baselines/<cpu>.json
# and grown as new CPUs appear:
#   - On a CPU we have a baseline for, throughput is gated against it — a real within-hardware regression
#     check (threshold widened to 20% + twice the measured noise to absorb residual same-CPU variance).
#   - On a CPU we have not seen, throughput is not gated (digest still is), so a PR is never blocked by
#     landing on new hardware. On a push to main, --bootstrap records that CPU's baseline and this job
#     opens a PR to commit it, so the fleet self-covers over time.
on:
  pull_request:
    paths: ["src/**", "benchmarks/**", "pyproject.toml"]
  push:
    branches: [main]
    paths: ["src/**", "benchmarks/**", "pyproject.toml"]

concurrency:
  group: bench-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # push a bootstrap branch (main only)
  pull-requests: write # open the bootstrap PR (main only)

jobs:
  bench-check:
    runs-on: ubuntu-24.04 # pinned, not -latest: keeps the OS image stable across runs
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.14
      - run: uv pip install -e ".[dev,fast,geo]" # geo: the bench-geo-* pipelines in the baseline
      # --bootstrap only on a push to main: a PR run gates if this CPU is known and otherwise passes, but
      # never records (recording a reference belongs on the canonical branch).
      - name: bench-check
        run: |
          uv run nautilus bench-check --threshold 0.20 \
            ${{ github.event_name == 'push' && '--bootstrap' || '' }}
      - name: Open a PR if a new CPU was bootstrapped
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain benchmarks/baselines)" ]; then
            echo "no new CPU baseline recorded — nothing to PR"
            exit 0
          fi
          branch="chore/bench-baseline-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add benchmarks/baselines
          git commit -m "chore(bench): bootstrap throughput baseline for a new CI CPU (run ${GITHUB_RUN_ID})"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore(bench): bootstrap throughput baseline for a new CI CPU" \
            --body "A push to main landed on a CPU with no throughput baseline, so bench-check recorded one (digests validated against the seed baseline.json). Review the numbers, then merge to gate future runs on this CPU. Auto-generated by the bench-check workflow (run ${GITHUB_RUN_ID})."
