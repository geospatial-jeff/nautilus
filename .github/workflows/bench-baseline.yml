name: bench-baseline

# Force re-record THIS runner's per-CPU throughput baseline (benchmarks/baselines/<cpu>.json) and open a
# PR with it. Run this by hand (Actions -> bench-baseline -> Run workflow) to move the reference after a
# deliberate perf change lands. It is the explicit counterpart to bench-check's automatic --bootstrap:
# bootstrap records a CPU the first time it is seen, this overwrites an existing CPU's numbers on demand.
# Which physical CPU the runner lands on is GitHub's choice, so this records whatever CPU it gets; re-run
# until it lands on the one you need to refresh. The result is a PR, not a direct push: moving the
# regression reference is a reviewed step.
on:
  workflow_dispatch:

permissions:
  contents: write # push the re-baseline branch
  pull-requests: write # open the PR

jobs:
  regenerate:
    runs-on: ubuntu-24.04 # same runner family bench-check.yml gates on
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.14
      - run: uv pip install -e ".[dev,fast,geo]"
      - name: Re-record this CPU's throughput baseline
        run: uv run nautilus bench-check --update
      - name: Confirm the fresh baseline passes its own gate
        # A single sweep can land a lucky-high or unlucky-low median that would immediately fail the gate
        # — the failure mode that makes a hand-recorded baseline useless. Re-check the just-written
        # baseline on this same VM, back-to-back (lower drift than across VM instances): a self-consistent
        # baseline clears the widened threshold, a too-noisy sweep fails here and never reaches the PR
        # step. --update is omitted, so this only validates against what was just recorded for this CPU.
        run: uv run nautilus bench-check --threshold 0.20
      - name: Open a PR if a baseline moved
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain benchmarks/baselines)" ]; then
            echo "baseline unchanged — nothing to PR"
            exit 0
          fi
          branch="chore/rebaseline-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add benchmarks/baselines
          git commit -m "chore(bench): re-record a CPU's throughput baseline (run ${GITHUB_RUN_ID})"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore(bench): re-record a CPU's throughput baseline" \
            --body "Re-recorded this runner's per-CPU throughput baseline via the bench-baseline workflow (run ${GITHUB_RUN_ID}). Review the deltas, then merge to move the reference for that CPU. Digests are validated against the seed baseline.json; if any differ, do not merge — that is an output change, not a speed change."
