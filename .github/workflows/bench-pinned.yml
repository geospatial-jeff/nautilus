name: bench-pinned

# The throughput regression gate on PINNED hardware — a self-hosted c7i.large runner (label
# `nautilus-bench`). It is the tight-tolerance counterpart to bench-check.yml: that job runs on
# GitHub-hosted runners that land on a different physical CPU each time, so it must keep per-CPU baselines
# and a wide 20% threshold to absorb cross-host variance. This job always runs on the same physical CPU,
# so its baseline is stable and its throughput threshold can be tight enough to catch a real regression
# that the wide shared-runner gate would wave through. The machine-independent structural digest is
# checked here too, but that is already covered by bench-check; the reason this job exists is the tight
# throughput number.
#
# SECURITY: this repo is public and the runner lives in a private AWS account, so untrusted code from a
# fork must never execute on it. The job is guarded to same-repo events only (a fork PR skips it and is
# still covered by the shared-runner bench-check). Keep the repo setting "Require approval for all
# outside collaborators" on as defense in depth.
on:
  pull_request:
    paths: ["src/**", "benchmarks/**", "pyproject.toml"]
  push:
    branches: [main]
    paths: ["src/**", "benchmarks/**", "pyproject.toml"]
  workflow_dispatch:

concurrency:
  # One physical box: serialize per ref, and let a newer commit supersede an in-flight run. Runs for
  # different refs still queue on the single runner, which also keeps measurements off a busy machine.
  group: bench-pinned-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # push a bootstrap branch (main only)
  pull-requests: write # open the bootstrap PR (main only)

jobs:
  bench-pinned:
    # Same-repo only — never run a fork's code on the self-hosted runner.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, nautilus-bench]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.14
      - run: uv pip install -e ".[dev,fast,geo]" # geo: the bench-geo-* pipelines in the baseline
      # Tight threshold: the pinned CPU removes the cross-host variance the shared gate's 0.20 absorbs.
      # --bootstrap only on a push to main: the first main run on this box records its per-CPU baseline
      # and opens a PR to commit it; PR runs gate against it once it exists and otherwise pass (digest
      # still gates), so a PR is never blocked by the baseline not existing yet.
      - name: bench-check (pinned)
        run: |
          uv run nautilus bench-check --threshold 0.10 \
            ${{ github.event_name == 'push' && '--bootstrap' || '' }}
      - name: Open a PR if this box's baseline was bootstrapped
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain benchmarks/baselines)" ]; then
            echo "no new baseline recorded — nothing to PR"
            exit 0
          fi
          branch="chore/bench-pinned-baseline-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add benchmarks/baselines
          git commit -m "chore(bench): record the pinned c7i.large throughput baseline (run ${GITHUB_RUN_ID})"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore(bench): record the pinned runner's throughput baseline" \
            --body "The first push to main on the pinned self-hosted runner recorded its per-CPU throughput baseline (digests validated against the seed baseline.json). Review the numbers, then merge to gate future runs on this hardware. Auto-generated by the bench-pinned workflow (run ${GITHUB_RUN_ID})."
