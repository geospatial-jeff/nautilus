name: bench-rebaseline

# Re-record benchmarks/baseline.json on the pinned self-hosted runner and open a PR with it. Run by hand
# (Actions -> bench-rebaseline -> Run workflow) to move the throughput reference after a deliberate perf
# change lands — and once, right after the runner comes up, to record the baseline on this hardware so
# bench-pinned actually gates throughput (until then it only checks the digest, as machine-differs).
# Moving the regression reference is a reviewed step, so the result is a PR, not a direct push.
on:
  workflow_dispatch:

permissions:
  contents: write # push the re-baseline branch
  pull-requests: write # open the PR

jobs:
  rebaseline:
    runs-on: [self-hosted, nautilus-bench]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.14
      - run: uv pip install -e ".[dev,fast,geo]"
      - name: Re-record the throughput baseline on this runner
        run: uv run nautilus bench-check --update
      - name: Confirm the fresh baseline passes its own gate
        # A single sweep can land a lucky-high or unlucky-low median that would immediately fail the gate —
        # the failure mode that makes a hand-recorded baseline useless. Re-check the just-written baseline
        # on this same box, back-to-back: a self-consistent baseline clears the threshold, a too-noisy
        # sweep fails here and never reaches the PR step.
        run: uv run nautilus bench-check --threshold 0.10
      - name: Record the baseline and push a branch
        id: rec
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain benchmarks/baseline.json)" ]; then
            echo "baseline unchanged — nothing to PR"
            echo "moved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          branch="chore/rebaseline-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add benchmarks/baseline.json
          git commit -m "chore(bench): re-record the pinned throughput baseline (run ${GITHUB_RUN_ID})"
          git push -u origin "$branch"
          echo "moved=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
      # Open the PR via github-script, not the gh CLI: the self-hosted runner has no gh binary, but it does
      # provide the Node the action runs on, so Octokit needs nothing installed.
      - name: Open the PR
        if: steps.rec.outputs.moved == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: '${{ steps.rec.outputs.branch }}',
              base: 'main',
              title: 'chore(bench): re-record the throughput baseline',
              body: 'Re-recorded benchmarks/baseline.json on the pinned runner via bench-rebaseline (run ${{ github.run_id }}). Review the deltas, then merge to move the reference. Digests must be unchanged — if any differ, that is an output change, not a speed change; do not merge.',
            });
